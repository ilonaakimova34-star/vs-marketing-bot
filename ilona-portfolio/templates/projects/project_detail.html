{% extends 'base.html' %}

{% block content %}

<section class="section">
    <a href="{% url 'project_list' %}" class="back-link">← Back to Work</a>
    
    {% if project.image %}
    <img src="{{ project.image.url }}" alt="{{ project.title }}" class="detail-image">
    {% endif %}

    <p class="card-tags">{{ project.tags }}</p>
    <h1>{{ project.title }}</h1>
    <p class="detail-description">{{ project.description }}</p>

    <div class="detail-links">
        {% if project.live_url %}
        <a href="{{ project.live_url }}" target="_blank" class="btn">View Live</a>
        {% endif %}
        {% if project.github_url %}
        <a href="{{ project.github_url }}" target="_blank" class="btn btn-outline">GitHub</a>
        {% endif %}
    </div>
</section>

{% endblock %}
